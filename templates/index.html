<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteFeed AI - Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>✨ TasteFeed AI</h2>
            <p>Upload a video to auto-generate food tags</p>
        </div>
        
        <!-- Upload Section -->
        <div class="upload-section" id="uploadBox">
            <input type="file" id="videoInput" accept="video/*" required>
            <div class="upload-content">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff5722" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p>Click to browse or drag video here</p>
            </div>
        </div>

        <!-- Preview Section (Hidden initially) -->
        <div id="previewSection" class="hidden">
            <video id="videoPreview" controls muted></video>
            <button id="analyzeBtn" class="primary-btn">Analyze Food with AI</button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>AI is analyzing frames... Please wait.</p>
        </div>

        <div id="errorMsg" class="hidden error"></div>

        <!-- Result Section -->
        <div id="reviewSection" class="hidden result-card">
            <h3 class="result-title">AI Suggested Tags</h3>
            <p class="instruction">Click on any tag to edit the text directly.</p>
            
            <div class="tag-container">
                <div class="tag-row"><span class="tag-label">Cuisine</span><span class="tag-chip cuisine-chip" id="cuisine" contenteditable="true"></span></div>
                <div class="tag-row"><span class="tag-label">Taste Profile</span><div id="taste_tags" class="taste-tags-wrapper"></div></div>
                <div class="tag-row"><span class="tag-label">Food Type</span><span class="tag-chip food-chip" id="food_type" contenteditable="true"></span></div>
                <div class="tag-row"><span class="tag-label">Meal Time</span><span class="tag-chip meal-chip" id="meal_type" contenteditable="true"></span></div>
                <div class="tag-row"><span class="tag-label">Dining Mode</span><span class="tag-chip dining-chip" id="dining_mode" contenteditable="true"></span></div>
            </div>
            <button id="resetBtn" class="secondary-btn">Upload Another Video</button>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // Handle Video Selection & Preview
        document.getElementById('videoInput').addEventListener('change', function(e) {
            selectedFile = this.files[0];
            if (!selectedFile) return;

            // Show video preview
            const videoUrl = URL.createObjectURL(selectedFile);
            document.getElementById('videoPreview').src = videoUrl;
            
            // Switch UI
            document.getElementById('uploadBox').style.display = 'none';
            document.getElementById('previewSection').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('reviewSection').classList.add('hidden');
        });

        // Handle Analysis
        document.getElementById('analyzeBtn').addEventListener('click', async function() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('video', selectedFile);

            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const textResponse = await response.text();
                
                let result;
                try {
                    result = JSON.parse(textResponse);
                } catch (parseError) {
                    throw new Error("Server Out of Memory. Video is too large for free tier.");
                }
                
                if(result.error) {
                    throw new Error(result.error);
                }

                // Populate Data
                document.getElementById('cuisine').innerText = result.cuisine || 'Unknown';
                document.getElementById('food_type').innerText = result.food_type || 'Unknown';
                document.getElementById('meal_type').innerText = result.meal_type || 'Unknown';
                document.getElementById('dining_mode').innerText = result.dining_mode || 'Unknown';
                
                const tasteWrapper = document.getElementById('taste_tags');
                tasteWrapper.innerHTML = '';
                (result.taste_tags || ["N/A"]).forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag-chip taste-chip';
                    span.contentEditable = "true";
                    span.innerText = tag;
                    tasteWrapper.appendChild(span);
                });
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('reviewSection').classList.remove('hidden');

            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorMsg').innerText = error.message;
                document.getElementById('errorMsg').classList.remove('hidden');
                document.getElementById('previewSection').classList.remove('hidden');
            }
        });

        // Reset Button
        document.getElementById('resetBtn').addEventListener('click', function() {
            document.getElementById('videoInput').value = "";
            selectedFile = null;
            document.getElementById('reviewSection').classList.add('hidden');
            document.getElementById('uploadBox').style.display = 'flex';
        });
    </script>
</body>
</html>
